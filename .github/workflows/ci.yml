# ==========================================
# GitHub Actions CI 工作流
# 触发条件: PR → main 分支
# 执行: dbt 编译测试 + Python lint + DAG 语法校验
# ==========================================

name: Data Platform CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:  # 支持手动触发

env:
  DBT_PROFILES_DIR: ${{ github.workspace }}/dbt
  PYTHON_VERSION: '3.13'

jobs:
  # ──── Job 1: Python 代码质量检查 ────
  python-lint:
    name: Python Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 安装依赖
        run: pip install pandas pyarrow pytest

      - name: Pytest 单元测试
        run: python -m pytest tests/ -v

      - name: Python 语法校验
        run: python -m py_compile dags/demo_pipeline.py && echo "✅ DAG 语法校验通过"

  # ──── Job 2: 端到端 Smoke Test ────
  smoke-test:
    name: Smoke Test (End-to-End)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 安装依赖
        run: pip install pandas pyarrow

      - name: Smoke Test — 数据生成 + 清洗 + Parquet 输出
        run: |
          python -c "
          import json, uuid, os, tempfile
          import pandas as pd

          # 生成测试数据
          events = [{'event_id': str(uuid.uuid4()), 'user_id': f'U{str(i).zfill(4)}',
                      'event_type': 'view', 'product_id': f'P{str(i).zfill(4)}',
                      'timestamp': '2026-07-20T10:00:00+00:00', 'page': 'home',
                      'referrer': 'google', 'duration_ms': 5000,
                      'device': 'mobile', 'browser': 'Chrome'} for i in range(1, 51)]

          df = pd.DataFrame(events)
          df['event_ts'] = pd.to_datetime(df['timestamp'])
          df['event_type'] = df['event_type'].str.lower()
          df['product_id'] = df['product_id'].fillna('unknown')
          df['referrer'] = df['referrer'].fillna('direct')
          df['duration_ms'] = df['duration_ms'].clip(0, 300000)
          df['processed_at'] = pd.Timestamp.now()
          df['processing_date'] = pd.Timestamp.now().date()

          out = tempfile.mkdtemp()
          df.to_parquet(os.path.join(out, 'events.parquet'), index=False)
          df_back = pd.read_parquet(out)
          assert len(df_back) == 50
          assert df_back['product_id'].iloc[0] == 'P0001'
          print(f'Smoke test PASSED: {len(df_back)} events processed')
          "

  # ──── Job 2: dbt 编译 & 测试 ────
  dbt-test:
    name: dbt Compile & Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: changeme
          POSTGRES_DB: data_platform
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 安装 dbt-postgres
        run: pip install dbt-postgres

      - name: dbt deps
        run: cd dbt && dbt deps
        continue-on-error: true

      - name: dbt compile
        run: cd dbt && dbt compile
        env:
          DBT_HOST: localhost
          DBT_PORT: 5432
          DBT_USER: admin
          DBT_PASSWORD: changeme
          DBT_DBNAME: data_platform

      - name: dbt test
        run: cd dbt && dbt test
        env:
          DBT_HOST: localhost
          DBT_PORT: 5432
          DBT_USER: admin
          DBT_PASSWORD: changeme
          DBT_DBNAME: data_platform
        continue-on-error: true

      - name: dbt docs generate
        run: cd dbt && dbt docs generate
        env:
          DBT_HOST: localhost
          DBT_PORT: 5432
          DBT_USER: admin
          DBT_PASSWORD: changeme
          DBT_DBNAME: data_platform
        continue-on-error: true

  # ──── Job 3: DAG 完整性校验 ────
  dag-validation:
    name: DAG Import & Structure Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 安装 Airflow
        run: pip install apache-airflow==2.10.4 --constraint "https://raw.githubusercontent.com/apache/airflow/constraints-2.10.4/constraints-3.13.txt" 2>&1 || pip install apache-airflow==2.10.4

      - name: 校验 DAG 可导入
        run: |
          python -c "
          import sys
          sys.path.insert(0, 'dags')
          from demo_pipeline import dag
          print(f'✅ DAG 导入成功: {dag.dag_id}')
          print(f'   Tasks: {len(dag.tasks)}')
          print(f'   Schedule: {dag.schedule_interval}')
          "

  # ──── Job 4: 汇总结果 ────
  ci-summary:
    name: CI Summary
    needs: [python-lint, smoke-test, dbt-test, dag-validation]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: 输出汇总
        run: |
          echo "========================================="
          echo "  Data Platform CI Pipeline 完成"
          echo "========================================="
          echo "  python-lint:    ${{ needs.python-lint.result }}"
          echo "  smoke-test:     ${{ needs.smoke-test.result }}"
          echo "  dbt-test:       ${{ needs.dbt-test.result }}"
          echo "  dag-validation: ${{ needs.dag-validation.result }}"
          echo "========================================="
