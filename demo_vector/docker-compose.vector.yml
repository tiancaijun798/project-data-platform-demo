# ==========================================
# Embedding + Vector Search 演示环境
# Milvus Standalone + etcd + MinIO
# ==========================================

services:
  # ---- Milvus 向量数据库 ----
  milvus:
    image: milvusdb/milvus:v2.4.0
    container_name: data-v-milvus
    ports:
      - "19530:19530"
      - "9091:9091"
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MINIO_ACCESS_KEY_ID: minioadmin
      MINIO_SECRET_ACCESS_KEY: minioadmin
    volumes:
      - milvus_data:/var/lib/milvus
    command: ["milvus", "run", "standalone"]
    networks:
      - vector-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # ---- etcd (Milvus 元数据) ----
  etcd:
    image: quay.io/coreos/etcd:v3.5.14
    container_name: data-v-etcd
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    volumes:
      - etcd_data:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    networks:
      - vector-net
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ---- MinIO (Milvus 对象存储) ----
  minio:
    image: minio/minio:RELEASE.2024-01-16T16-07-03Z
    container_name: data-v-minio
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    volumes:
      - minio_data:/minio_data
    command: minio server /minio_data --console-address ":9001"
    networks:
      - vector-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ---- Embedding API 服务 ----
  embedding-api:
    build:
      context: .
      dockerfile: Dockerfile.vector
    container_name: data-v-embedding-api
    ports:
      - "8001:8001"
    volumes:
      - .:/app/demo_vector:ro
      - ../data:/app/data:ro
    environment:
      MILVUS_HOST: milvus
      MILVUS_PORT: "19530"
      EMBEDDING_MODEL: paraphrase-multilingual-MiniLM-L12-v2
    depends_on:
      milvus:
        condition: service_healthy
    networks:
      - vector-net
      - data-platform-net
    restart: unless-stopped

networks:
  vector-net:
    name: data-vector-net
    driver: bridge
  data-platform-net:
    external: true

volumes:
  milvus_data:
    name: vector-milvus
  etcd_data:
    name: vector-etcd
  minio_data:
    name: vector-minio
