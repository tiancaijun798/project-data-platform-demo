# ==========================================
# Grafana Dashboard Provider 配置
# ==========================================

apiVersion: 1

providers:
  - name: "Data Platform"
    orgId: 1
    folder: "Data Platform"
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: true
