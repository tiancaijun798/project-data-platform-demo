# ==========================================
# Prometheus 配置
# 采集目标: 应用、Airflow StatsD、自监控
# ==========================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

rule_files:
  - "alerts.yml"

scrape_configs:
  # ── 1. Prometheus 自监控 ──
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # ── 2. FastAPI 应用 Prometheus 指标 ──
  - job_name: "data-platform-app"
    metrics_path: /metrics
    static_configs:
      - targets: ["data-platform-app:8000"]

  # ── 3. Airflow StatsD Exporter ──
  - job_name: "airflow-statsd"
    static_configs:
      - targets: ["statsd-exporter:9102"]
    metrics_path: /metrics

  # ── 4. PostgreSQL (需 postgres_exporter 容器，暂未部署) ──
  # - job_name: "postgres"
