# ==========================================
# Prometheus 配置
# 采集目标: 应用健康端点、Airflow metrics、系统指标
# ==========================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

# 告警规则
rule_files:
  - "alerts.yml"

# 采集配置
scrape_configs:
  # ── 1. Prometheus 自监控 ──
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # ── 2. 应用健康端点 ──
  - job_name: "data-platform-app"
    metrics_path: /health
    static_configs:
      - targets: ["data-platform-app:8000"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "data-platform-app"

  # ── 3. Airflow StatsD Exporter ──
  - job_name: "airflow-statsd"
    static_configs:
      - targets: ["statsd-exporter:9102"]
    metrics_path: /metrics

  # ── 4. PostgreSQL ──
  - job_name: "postgres"
    static_configs:
      - targets: ["data-platform-db:9187"]
    metrics_path: /metrics

  # ── 5. Redis ──
  - job_name: "redis"
    static_configs:
      - targets: ["data-platform-cache:9121"]
    metrics_path: /metrics

  # ── 6. Docker Host (cAdvisor 或 node_exporter) ──
  - job_name: "docker-host"
    static_configs:
      - targets: ["host.docker.internal:9100"]
    metrics_path: /metrics
