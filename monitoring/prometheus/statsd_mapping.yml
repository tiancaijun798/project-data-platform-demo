# ==========================================
# StatsD → Prometheus 指标映射
# 将 Airflow 的 StatsD 指标转换为 Prometheus 格式
# ==========================================

mappings:
  # DAG 调度指标
  - match: "airflow.dag.*.*.*.duration"
    name: "airflow_dag_task_duration_seconds"
    labels:
      dag_id: "$1"
      task_id: "$2"
      run_id: "$3"

  - match: "airflow.dag.*.*.*.start"
    name: "airflow_dag_task_start_timestamp_seconds"
    labels:
      dag_id: "$1"
      task_id: "$2"
      run_id: "$3"

  - match: "airflow.dag.*.*.*.end"
    name: "airflow_dag_task_end_timestamp_seconds"
    labels:
      dag_id: "$1"
      task_id: "$2"
      run_id: "$3"

  # 任务成功/失败计数
  - match: "airflow.dag.*.*.success"
    name: "airflow_dag_task_success_total"
    labels:
      dag_id: "$1"
      task_id: "$2"
    match_metric_type: counter

  - match: "airflow.dag.*.*.failure"
    name: "airflow_dag_task_failure_total"
    labels:
      dag_id: "$1"
      task_id: "$2"
    match_metric_type: counter

  # 调度器指标
  - match: "airflow.scheduler_heartbeat"
    name: "airflow_scheduler_heartbeat_total"
    match_metric_type: counter

  - match: "airflow.dag_processing.total_parse_time"
    name: "airflow_dag_processing_parse_time_seconds"

  # 池/队列指标
  - match: "airflow.pool.*.open_slots"
    name: "airflow_pool_open_slots"
    labels:
      pool: "$1"

  - match: "airflow.pool.*.queued_slots"
    name: "airflow_pool_queued_slots"
    labels:
      pool: "$1"

  # 通用匹配
  - match: "airflow.collect_dags"
    name: "airflow_dag_collect_total"
    match_metric_type: counter
